<!doctype html>
<!-- translate="no" + the notranslate class opt this SPA out of Google Translate / Chrome
     auto-translate. Those tools swap React-managed TEXT NODES out from under the reconciler,
     after which React's commit-phase removeChild/insertBefore hits a node that is "not a child
     of this node" and throws NotFoundError (~700× in error.err, pure React-internal stacks with
     zero app frames — the classic translation-extension signature). Opting out is the standard,
     effective prevention. See also the <meta name="google" content="notranslate"> below. -->
<html lang="en" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Belt-and-suspenders with the html translate="no": tells Google Translate to leave the
         whole document alone so it can't mutate React's text nodes and crash the reconciler. -->
    <meta name="google" content="notranslate" />
    <!-- Stable ownership marker: lets the port resolver tell OUR web server apart from a
         foreign process squatting on the port (code_plan.mdx §2, port collision policy). -->
    <meta name="x-app" content="large-file-bridge" />
    <!-- Favicon lives in public/ (served at web root by Vite). To switch to a different
         option, copy any file from public/favicons/ over public/favicon.ico — see the
         README in that folder for the catalog of alternatives.
         NOTE: an ICO-only <link> is unreliable in Chrome (it often skips it on localhost).
         We ship a 32x32 PNG alongside the .ico — Chrome prefers the PNG — plus an
         apple-touch-icon. Regenerate the PNGs from favicon.ico with `sips` if you swap it. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Large File Bridge</title>
  </head>
  <body>
    <!-- notranslate here too: the app shell is where a translation mutation would unmount
         everything, so double-mark it (in addition to <html translate="no">). -->
    <div id="root" class="notranslate" translate="no"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
