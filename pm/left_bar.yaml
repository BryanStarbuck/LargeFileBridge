# ============================================================================
# LargeFileBridge — Left Navigation Bar Specification
# ============================================================================
# Single source of truth for the app's left-side navigation bar.
# The frontend imports THIS file directly (code/.../src/config/left_bar.ts,
# via Vite `?raw`) — there is no separate code copy of the nav content.
# Human companion spec: pm/left_bar.mdx (wordmark, color rules, states).
#
# There is ONE left bar (the product is a focused, single-window localhost app):
#   1. app  — a flat list of the primary sections. Settings is a nav item that
#             routes to /settings; there is no separate settings sub-bar yet.
#
# Product context (see README.md + CLAUDE.md charter):
#   - Localhost web app that pins a user's LARGE files across their own
#     computers via IPFS. Git tracks the small files; LFBridge moves the big,
#     git-ignored files peer-to-peer. Node + TypeScript.
#   - Auth: OpenAuthFederated federated Google SSO. Allow-listed users only.
#     No default / anonymous account — every bar renders for a signed-in user.
# ============================================================================

Left_Nav:
  Left_bars:

    # ==========================================================================
    # LEFT BAR: app — the main app
    # ==========================================================================
    - Location: app
      name: "LargeFileBridge — Main Left Bar"
      description: "Primary navigation: Repos, Storages, File System, Devices / Peers, Communities, IPFS, Scans, Settings."
      auth_system: "openauth_federated"
      sidebar_width: 256px

      header:
        kind: logo
        # Spaces between the three words are REQUIRED (pm/left_bar.mdx §1) —
        # never "LargeFileBridge" run together in the wordmark. Rendered
        # verbatim, normal tracking.
        label: "Large File Bridge"
        alt_text: "Large File Bridge — pin large files across your computers via IPFS"
        click_route: "/"

      # Color rules (pm/left_bar.mdx §2, LOCKED): all left-bar text is black;
      # anything on the brand accent (wordmark, active item, sign-in accent)
      # stays the accent color; anything that was medium grey becomes black.
      styling:
        text_color: "black"
        keep_accent: ["wordmark", "active_item", "sign_in_accent"]
        replace_medium_grey_with: "black"

      nav_items:
        - id: repos
          label: "Repos"
          icon: "FolderGit2"
          route: "/"
          order: 1
          description: "Every git repo on this computer that LargeFileBridge manages, with its large-file pin counts and status. This is the dedicated long list of repos; the Storages tab links here rather than re-listing them."

        # STORAGES (pm/storages.mdx) — the map of everything this user pins. A grouping tab whose
        # children are the storages the user belongs to: Personal (storage_personal.mdx), one child
        # per Company (storage_company.mdx, labeled by company_name — DERIVED at runtime from each
        # storage.yaml), a Repos child that routes to the Repos tab above (NOT a long list here), and
        # the opted-in Communities (storage_community.mdx). Local storage (settings/config, the DB
        # replacement — storage_local.mdx) is NOT listed here; it is not a directory-based storage.
        - id: storages
          label: "Storages"
          icon: "HardDrive"
          route: "/storages"
          order: 2
          description: "All the large-file storages you belong to in one map: your Personal files, each Company you're in, a Repos link to the repos list, and the Communities you carry. Each directory-based storage (an SDL) has a storage.yaml (name + type) at its ROOT, which IS its tracking area — an SDL has no .lfbridge/ (that is only for working git repos; see pm/artifact_placement_policy.mdx §0). It pins over IPFS, and may also clone to Google Drive / Dropbox. See pm/storages.mdx."
          # OWNER-GROUPED REPO NESTING (pm/left_bar.mdx §3.2, pm/repo_company_mapping.mdx): on top of the
          # static children below, each repo GROUPS UNDER ITS OWNER — the Personal child and each per-Company
          # child are THEMSELVES expandable to reveal the repos owned by them (label = repo name, route =
          # /repos/$repoId). This is IN ADDITION TO the flat "Repos" child (which still routes to the long
          # list) — a repo appears both under its owner group and in the flat list. These per-owner repo
          # sub-lists are RUNTIME-INJECTED by Sidebar.tsx (like the per-Company children), grouping the
          # discovered repos by RepoRow.owner and labeling companies by their friendly display name
          # (storage_company.mdx §6); an auto-derived company group carries an (auto-detected) hint. They are
          # NOT static array elements here (they depend on live state) — documented, not rendered from yaml.
          children:
            - id: storages_personal
              label: "Personal"
              route: "/storages/personal"
              description: "Your own private big files, and the DEFAULT owner of any repo with no forge org — expands to the repos owned by you (storage_personal.mdx, repo_company_mapping.mdx)."
            # One child PER COMPANY is inserted here at runtime, labeled by the company's friendly display
            # name (storage_company.mdx §6, derived from each company storage's storage.yaml company_name).
            # Each company child is EXPANDABLE to the repos mapped to that company (repo_company_mapping.mdx).
            - id: storages_repos
              label: "Repos"
              route: "/"
              description: "Routes to the Repos tab (the long list) — the Storages tab does not re-list every repo (storage_repo.mdx)."
            - id: storages_communities
              label: "Communities"
              route: "/communities"
              description: "The communities you have opted into carrying — download or share (storage_community.mdx)."

        - id: file_system
          label: "File System"
          icon: "Columns3"
          route: "/fs"
          order: 3
          description: "Browse your whole filesystem two ways: a Finder-style column view (/fs) and a flat Full-paths table (/fs/paths) of the large files under a folder. Each row shows code badges: R/r repo (brown), P pin (pink), C/c compress (yellow), i IPFS (blue). Folders whose subtree holds big files, videos, or heavy images get interesting-directory coloring (brown/blue tinting). Defaults to your home directory. See pm/file_system.mdx (hub + folder coloring) + pm/directories.mdx + pm/full_paths.mdx."

        # DEVICES / PEERS (pm/devices.mdx). The registry of every COMPUTER that carries your files —
        # this Mac, a laptop, a studio tower, a server, a family iMac. The page ALWAYS shows at least
        # THIS computer (auto-seeded from config.yaml→computer, never an empty table). Each row is a
        # device identified by its hardware fingerprint (model, year, screen size, disk, RAM, chip) so
        # two similar MacBook Pros disambiguate by the attributes that differ. "Devices" is the noun;
        # "Peers" stays in the label because these devices pin one another's files over IPFS.
        - id: devices
          label: "Devices / Peers"
          icon: "Network"
          route: "/devices"
          order: 4
          description: "Every computer that carries your files — this Mac, your laptop, a studio tower, a server, a family iMac — pinning one another's files over IPFS. Always shows at least this computer. Each device is identified by its hardware (model, year, screen size, disk, RAM) so similar machines are told apart."

        # Devices/Peers are YOUR computers pinning YOUR files; Communities are OTHER people's
        # public files you opt into carrying — Get them to watch, or Support them by
        # rebroadcasting to keep them secure. Explicit per-community opt-in, Block by
        # default; never a public gateway/relay (charter). See pm/communities.mdx.
        - id: communities
          label: "Communities"
          icon: "Users"
          route: "/communities"
          order: 5
          description: "Publishers of large public files (videos first) you can subscribe to — Get their videos to watch, or Support them by rebroadcasting to keep them secure. Per community: Block / Recommended / Full backup, against a storage budget derived from this computer's free disk outside IPFS. See pm/communities.mdx."

        - id: ipfs
          label: "IPFS"
          icon: "Boxes"
          route: "/ipfs"
          order: 6
          description: "Your local IPFS node's control panel: is it installed and running, an on/off toggle, live metrics (shared files, storage, peers, bandwidth), the gateway, and the only-our-content security posture. Drills into the pinset table at /ipfs/pins. See pm/ipfs_ui.mdx (dashboard) + pm/ipfs.mdx (pinset)."

        # NAMING (pm/menus.mdx / scan.mdx): the scheduled background jobs are
        # "scheduleTasks" internally; the UI calls what they do "scans". This
        # page is the transparency+control surface for both scheduleTasks — the
        # every-15-min one (pin bytes + read the IPFS pinset) and the every-4h
        # discovery one — whether each is installed, on/off, and recent runs.
        - id: scans
          label: "Scans"
          icon: "RefreshCw"
          route: "/scans"
          order: 7
          description: "The scheduled background scan tasks (scheduleTasks): whether each launchd job is installed, on or off, the every-15-min and every-4h schedules, and recent activity."

        # TO DO (pm/to_do.mdx). The single aggregated list of everything LargeFileBridge recommends
        # doing, bundled per storage as TO DO Batches (pm/to_do_batches.mdx). Each batch WITH WORK
        # renders as a SLUG (compact card); only storages with work show. Carries a count badge =
        # non-dismissed batches with work. Produced by the TO DO Batch Calc Engine during the scan
        # recalc (pm/to_do_batch_calc_engine.mdx) + the on-demand What-Can-Be-Transcribed engine
        # (pm/transcribe_calc_engine.mdx). Same model as the per-page warnings (pm/warnings.mdx).
        - id: todo
          label: "To Do"
          icon: "ListTodo"
          route: "/todo"
          order: 8
          description: "Everything Large File Bridge recommends you do, bundled per storage: files to pull down from your other computers, big files to git-ignore, videos/images to compress, files to back up, and media to transcribe. Only storages with work show; each is a slug you open to review and apply. Carries a count badge of how many need attention. See pm/to_do.mdx."

        - id: settings
          label: "Settings"
          icon: "Settings"
          route: "/settings"
          order: 9
          description: "Account, allow-list, and IPFS node configuration."

        # ----------------------------------------------------------------------
        # RUNTIME-ONLY item — PROCESSING (pm/processing.mdx, pm/left_bar.mdx §3.1)
        # Documented here for discoverability, but NOT a rendered nav_items entry:
        # do NOT add it as a real array element. It is INJECTED AT RUNTIME by
        # Sidebar.tsx (like the dynamic per-Company children under Storages),
        # appended as the LAST item of this top list — after Settings (order 9),
        # before the account slot — ONLY while background work is running (a job
        # running, a pending backlog, or an active "Compress inside" batch), and
        # it disappears when work finishes.
        #   - id: processing
        #     label: "Processing"
        #     icon: "Loader2"
        #     route: "/processing"
        #     order: 10   # tail of the list; runtime-injected, not statically rendered

      # EXTERNAL PRODUCT LINKS (pm/left_bar.mdx §4.2). A small set of OUTBOUND links to our other
      # products, shown in the space BETWEEN the bottom of the top nav list and the account slot, evenly
      # spaced/centered. Each opens in a NEW browser tab (target=_blank, rel=noopener) — it navigates to an
      # external site, not an in-app route. These are the ONLY nav entries that leave the app. Add/remove a
      # product link here (content source of truth); Sidebar.tsx renders them from this list.
      external_links:
        - id: jfk_social
          label: "JFK Social.com"
          url: "https://JFKSocial.com/"
        - id: act3_filmmaking
          label: "ACT 3 Filmmaking"
          url: "https://ACT3ai.com/"

      # Footer: account block (avatar/name/Google email) -> popup menu (expands UP).
      footer:
        - id: account_block
          type: account
          expands_upward: true
          shows: ["avatar", "name", "email"]
          menu_items:
            - id: settings
              label: "Settings"
              icon: "Settings"
              route: "/settings"
            - id: admin
              label: "Allow-list"
              icon: "ShieldAlert"
              route: "/settings/allow-list"
              permission_gate: "role:admin"
            - id: logout
              label: "Log out"
              icon: "LogOut"
              action: "sign_out"
